<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>REINO STUDIO - MODELO AZUL CORRETO</title>
<meta name="theme-color" content="#087BEA">
<link rel="manifest" href="manifest.json">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,Helvetica,sans-serif;background:#001a58;color:#fff;padding:12px}
.app{max-width:560px;margin:auto}
.card{background:#fff;color:#081c55;border-radius:22px;padding:16px;margin-bottom:16px;box-shadow:0 16px 40px rgba(0,0,0,.35)}
.hero{background:linear-gradient(135deg,#06328c,#0a95ff);color:#fff;border:1px solid rgba(255,255,255,.35)}
.hero h1{font-size:22px;font-weight:900}
.hero p{font-size:13px;margin-top:6px;line-height:1.35}
label{display:block;font-size:14px;font-weight:900;margin:13px 0 6px}
input,select{width:100%;padding:13px 14px;border:1px solid #b9cbef;border-radius:14px;font-size:16px;background:#f8fbff}
.row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
button{width:100%;border:0;border-radius:16px;padding:14px 12px;font-size:15px;font-weight:900;margin-top:12px}
.blue{background:linear-gradient(90deg,#0645c8,#0a8fff);color:#fff}
.gold{background:linear-gradient(90deg,#f7bd1c,#ffe680);color:#06205e}
.green{background:linear-gradient(90deg,#00a83b,#22e071);color:#fff}
.tools{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.tools button{font-size:17px;padding:12px 0;background:#eaf1ff;color:#063c9f}
.linkbox{font-size:12px;background:#eef4ff;color:#06175c;border:1px solid #c5d5f4;border-radius:13px;padding:11px;margin-top:10px;word-break:break-all}
.help{font-size:12px;line-height:1.35;margin-top:10px;color:#17316d}
.preview{background:#fff;border-radius:24px;padding:10px;box-shadow:0 16px 40px rgba(0,0,0,.35);overflow:hidden}
canvas{display:block;width:100%;height:auto;border-radius:18px;background:#fff}
@media(max-width:520px){body{padding:10px}.card{padding:14px;border-radius:18px}.hero h1{font-size:20px}.row{gap:8px}input,select{font-size:15px}}
</style>
</head>
<body>
<div class="app">

  <div class="card hero">
    <h1>REINO STUDIO - MODELO AZUL CORRETO</h1>
    <p>Fundo oficial real, topo e vendedor/contato fixos, arte do sorteio sem cortar e geração PNG 1080x1920.</p>
  </div>

  <div class="card">
    <label>Arte oficial do sorteio</label>
    <input type="file" id="arteInput" accept="image/*">

    <label>Foto do vendedor</label>
    <input type="file" id="fotoInput" accept="image/*">

    <div class="row">
      <div>
        <label>Nome do vendedor</label>
        <input type="text" id="nomeInput" placeholder="Nome do vendedor">
      </div>
      <div>
        <label>WhatsApp</label>
        <input type="tel" id="foneInput" placeholder="88999999999" maxlength="15" inputmode="numeric">
      </div>
    </div>

    <div class="row">
      <div>
        <label>Cor do texto</label>
        <select id="corInput">
          <option value="#000000">Preto</option>
          <option value="#ffffff">Branco</option>
          <option value="#ffd84d">Dourado</option>
          <option value="#073b9a">Azul escuro</option>
        </select>
      </div>
      <div>
        <label>Fonte</label>
        <select id="fonteInput">
          <option value="Arial">Arial</option>
          <option value="Arial Black">Arial Black</option>
          <option value="Verdana">Verdana</option>
          <option value="Tahoma">Tahoma</option>
          <option value="Georgia">Georgia</option>
          <option value="Impact">Impact</option>
        </select>
      </div>
    </div>

    <div class="row">
      <div>
        <label>Tamanho</label>
        <select id="tamInput">
          <option value="48">Pequeno</option>
          <option value="56" selected>Médio</option>
          <option value="64">Grande</option>
          <option value="72">Muito grande</option>
        </select>
      </div>
      <div>
        <label>Negrito</label>
        <select id="boldInput">
          <option value="400">Normal</option>
          <option value="900">Negrito</option>
        </select>
      </div>
    </div>

    <label>Ajuste fino da foto</label>
    <div class="tools">
      <button onclick="ajustar('zoom',.05)">+</button>
      <button onclick="ajustar('zoom',-.05)">−</button>
      <button onclick="ajustar('y',-14)">↑</button>
      <button onclick="ajustar('y',14)">↓</button>
    </div>
    <div class="tools">
      <button onclick="ajustar('x',-14)">←</button>
      <button onclick="ajustar('x',14)">→</button>
      <button onclick="resetFoto()">Reset</button>
      <button onclick="copiarLink()">Link</button>
    </div>

    <button class="blue" onclick="desenhar()">VISUALIZAR ARTE</button>
    <button class="gold" onclick="baixar()">BAIXAR PNG HD</button>
    <button class="green" onclick="compartilhar()">SALVAR / COMPARTILHAR</button>

    <div class="linkbox" id="linkBox">Digite o WhatsApp para gerar o link.</div>
    <p class="help">Suba no GitHub mantendo a pasta <b>assets</b> junto do <b>index.html</b>. Este pacote já tem as imagens reais, não placeholders.</p>
  </div>

  <div class="preview">
    <canvas id="canvas" width="1080" height="1920"></canvas>
  </div>

</div>

<script>
const canvas=document.getElementById('canvas');
const ctx=canvas.getContext('2d');
const W=1080, H=1920;

let bg=null, topo=null, bloco=null, arte=null, foto=null;
let fotoState={zoom:1,x:0,y:0};
let waLink='';

function loadImg(src){
  return new Promise(resolve=>{
    const im=new Image();
    im.onload=()=>resolve(im);
    im.onerror=()=>resolve(null);
    im.src=src;
  });
}
function fileToImage(file){
  return new Promise(resolve=>{
    const r=new FileReader();
    r.onload=()=>{
      const im=new Image();
      im.onload=()=>resolve(im);
      im.src=r.result;
    };
    r.readAsDataURL(file);
  });
}
function cover(im,x,y,w,h){
  if(!im)return;
  const ir=im.width/im.height, br=w/h;
  let sx=0, sy=0, sw=im.width, sh=im.height;
  if(ir>br){sw=im.height*br; sx=(im.width-sw)/2;}
  else{sh=im.width/br; sy=(im.height-sh)/2;}
  ctx.drawImage(im,sx,sy,sw,sh,x,y,w,h);
}
function contain(im,x,y,w,h){
  if(!im)return;
  const r=Math.min(w/im.width,h/im.height);
  const nw=im.width*r, nh=im.height*r;
  ctx.drawImage(im,x+(w-nw)/2,y+(h-nh)/2,nw,nh);
}
function telefoneFormatado(raw){
  let n=(raw||'').replace(/\D/g,'').slice(0,11);
  if(n.length<=2)return n;
  if(n.length<=7)return '('+n.slice(0,2)+') '+n.slice(2);
  return '('+n.slice(0,2)+') '+n.slice(2,7)+'-'+n.slice(7,11);
}
function atualizarLink(){
  const d=(foneInput.value||'').replace(/\D/g,'').slice(0,11);
  if(d.length===11){
    waLink='https://wa.me/55'+d;
    linkBox.textContent=waLink;
  }else{
    waLink='';
    linkBox.textContent='Digite DDD + número com 11 dígitos.';
  }
}
function textoAuto(txt,x,y,maxW,size,color,font,weight){
  let s=size;
  do{
    ctx.font=`${weight} ${s}px "${font}", Arial, sans-serif`;
    if(ctx.measureText(txt).width<=maxW)break;
    s-=2;
  }while(s>28);
  ctx.fillStyle=color;
  ctx.fillText(txt,x,y);
}
function desenhar(){
  atualizarLink();

  ctx.clearRect(0,0,W,H);

  // Fundo oficial preenchendo 100%
  cover(bg,0,0,W,H);

  // Topo fixo, transparente, sobre o fundo
  contain(topo,80,22,920,190);

  // Arte oficial do sorteio inteira, sem cortar
  const ax=128, ay=235, aw=824, ah=1112;
  if(arte){
    contain(arte,ax,ay,aw,ah);
  }else{
    ctx.fillStyle='rgba(220,220,220,.9)';
    ctx.fillRect(ax,ay,aw,ah);
    ctx.fillStyle='#111';
    ctx.font='56px Arial';
    ctx.textAlign='center';
    ctx.fillText('Área da arte do sorteio',540,790);
    ctx.textAlign='left';
  }

  // Máscara fixa vendedor/contato
  contain(bloco,-8,1385,445,430);

  // Texto
  const nome=(nomeInput.value||'Nome do vendedor').trim();
  const fone=telefoneFormatado(foneInput.value)||'(00) 0 0000-0000';
  const color=corInput.value;
  const font=fonteInput.value;
  const weight=boldInput.value;
  const size=parseInt(tamInput.value,10);
  textoAuto(nome,138,1548,410,size,color,font,weight);
  textoAuto(fone,138,1765,410,Math.max(42,size-5),color,font,weight);

  // Foto circular fixa
  const cx=755, cy=1634, r=248;
  ctx.save();
  ctx.beginPath();
  ctx.arc(cx,cy,r,0,Math.PI*2);
  ctx.clip();
  if(foto){
    const sc=Math.max((r*2)/foto.width,(r*2)/foto.height)*fotoState.zoom;
    const iw=foto.width*sc, ih=foto.height*sc;
    ctx.filter='contrast(1.06) saturate(1.06) brightness(1.03)';
    ctx.drawImage(foto,cx-iw/2+fotoState.x,cy-ih/2+fotoState.y,iw,ih);
    ctx.filter='none';
  }else{
    ctx.fillStyle='rgba(220,220,220,.78)';
    ctx.fillRect(cx-r,cy-r,r*2,r*2);
    ctx.fillStyle='#111';
    ctx.font='38px Arial';
    ctx.textAlign='center';
    ctx.fillText('foto do vendedor',cx,cy);
    ctx.textAlign='left';
  }
  ctx.restore();

  ctx.strokeStyle='rgba(255,255,255,.55)';
  ctx.lineWidth=4;
  ctx.beginPath();
  ctx.arc(cx,cy,r,0,Math.PI*2);
  ctx.stroke();
}
function ajustar(tipo,valor){
  if(tipo==='zoom')fotoState.zoom=Math.max(.55,Math.min(2.8,fotoState.zoom+valor));
  if(tipo==='x')fotoState.x+=valor;
  if(tipo==='y')fotoState.y+=valor;
  desenhar();
}
function resetFoto(){
  fotoState={zoom:1,x:0,y:0};
  desenhar();
}
async function copiarLink(){
  atualizarLink();
  if(!waLink){alert('Digite um WhatsApp válido.');return;}
  await navigator.clipboard.writeText(waLink);
  alert('Link copiado.');
}
function baixar(){
  desenhar();
  canvas.toBlob(blob=>{
    const a=document.createElement('a');
    a.href=URL.createObjectURL(blob);
    a.download='reino-studio-modelo-azul.png';
    a.click();
    setTimeout(()=>URL.revokeObjectURL(a.href),1500);
  },'image/png',1);
}
function compartilhar(){
  desenhar();
  canvas.toBlob(async blob=>{
    const file=new File([blob],'reino-studio-modelo-azul.png',{type:'image/png'});
    if(navigator.canShare && navigator.canShare({files:[file]})){
      await navigator.share({files:[file],title:'Arte Reino da Sorte'});
    }else baixar();
  },'image/png',1);
}

arteInput.addEventListener('change',async()=>{const f=arteInput.files[0];if(f){arte=await fileToImage(f);desenhar();}});
fotoInput.addEventListener('change',async()=>{const f=fotoInput.files[0];if(f){fotoState={zoom:1,x:0,y:0};foto=await fileToImage(f);desenhar();}});
foneInput.addEventListener('input',()=>{foneInput.value=telefoneFormatado(foneInput.value);desenhar();});
[nomeInput,corInput,fonteInput,tamInput,boldInput].forEach(el=>{el.addEventListener('input',desenhar);el.addEventListener('change',desenhar);});

(async()=>{
  bg=await loadImg('assets/fundo-oficial.jpg');
  topo=await loadImg('assets/topo-vendedores-autorizados.png');
  bloco=await loadImg('assets/vendedor-contato.png');
  desenhar();
})();
</script>
</body>
</html>
