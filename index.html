<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>REINO STUDIO - Layout Fixo</title>

<style>

/* ========================================================= */
/* ÁREA TOTAL */
/* ========================================================= */

body{
    margin:0;
    background:#001b57;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

#arte-final{
    position:relative;
    width:1080px;
    height:1920px;
    overflow:hidden;
    background:#ffffff;
}

/* ========================================================= */
/* FUNDO AZUL OFICIAL */
/* ========================================================= */

#fundo-oficial{
    position:absolute;
    inset:0;
    width:100%;
    height:100%;
    object-fit:cover;
    z-index:1;
}

/* ========================================================= */
/* TOPO FIXO */
/* ========================================================= */

#topo-oficial{
    position:absolute;
    top:22px;
    left:50%;
    transform:translateX(-50%);
    width:760px;
    object-fit:contain;
    z-index:20;
}

/* ========================================================= */
/* ARTE SORTEIO */
/* ========================================================= */

#area-sorteio{
    position:absolute;
    top:180px;
    left:98px;
    width:884px;
    height:1110px;
    z-index:10;

    display:flex;
    align-items:center;
    justify-content:center;
}

#arte-sorteio{
    width:100%;
    height:100%;
    object-fit:contain;
}

/* ========================================================= */
/* SELO FIXO */
/* ========================================================= */

#selo-vendedor{
    position:absolute;
    right:48px;
    bottom:525px;
    width:165px;
    z-index:30;
}

/* ========================================================= */
/* BLOCO VENDEDOR / CONTATO */
/* ========================================================= */

#bloco-vendedor-contato{
    position:absolute;
    left:28px;
    bottom:115px;
    width:350px;
    z-index:20;
}

/* ========================================================= */
/* NOME */
/* ========================================================= */

#nome-vendedor{
    position:absolute;
    left:112px;
    bottom:335px;

    width:360px;

    color:#000000;
    font-size:58px;
    font-family:Arial,sans-serif;
    font-weight:400;

    z-index:30;

    overflow:hidden;
    white-space:nowrap;
    text-overflow:ellipsis;
}

/* ========================================================= */
/* TELEFONE */
/* ========================================================= */

#telefone-vendedor{
    position:absolute;
    left:112px;
    bottom:145px;

    width:360px;

    color:#000000;
    font-size:58px;
    font-family:Arial,sans-serif;
    font-weight:400;

    z-index:30;

    overflow:hidden;
    white-space:nowrap;
    text-overflow:ellipsis;
}

/* ========================================================= */
/* FOTO FIXA */
/* ========================================================= */

#foto-box{
    position:absolute;

    right:55px;
    bottom:58px;

    width:420px;
    height:420px;

    border-radius:50%;
    overflow:hidden;

    z-index:25;
}

#foto-vendedor{
    width:100%;
    height:100%;
    object-fit:cover;
}

</style>
</head>

<body>

<div id="arte-final">

  <!-- FUNDO AZUL OFICIAL -->
  <img
    id="fundo-oficial"
    src="assets/fundo-azul-oficial.png"
  />

  <!-- TOPO FIXO -->
  <img
    id="topo-oficial"
    src="assets/topo-vendedores-autorizados.png"
  />

  <!-- ARTE DO SORTEIO -->
  <div id="area-sorteio">
    <img
      id="arte-sorteio"
      src="assets/exemplo-arte.png"
    />
  </div>

  <!-- SELO FIXO -->
  <img
    id="selo-vendedor"
    src="assets/selo-vendedor.png"
  />

  <!-- BLOCO VENDEDOR / CONTATO -->
  <img
    id="bloco-vendedor-contato"
    src="assets/vendedor-contato.png"
  />

  <!-- NOME -->
  <div id="nome-vendedor">
    Nome do vendedor
  </div>

  <!-- TELEFONE -->
  <div id="telefone-vendedor">
    (00) 0 0000-0000
  </div>

  <!-- FOTO FIXA -->
  <div id="foto-box">
    <img
      id="foto-vendedor"
      src="assets/foto-vendedor.png"
    />
  </div>

</div>

</body>
</html>
