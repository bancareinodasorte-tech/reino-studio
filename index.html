<!DOCTYPE html><html><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width,initial-scale=1.0'><title>REINO STUDIO V3</title><style>body{font-family:Arial;background:#02134d;padding:20px;color:#fff} .box{max-width:480px;margin:auto;background:#0d1d72;padding:20px;border-radius:30px} input,select,button{width:100%;padding:15px;border-radius:18px;border:none;margin-top:12px} button{font-weight:bold} .preview{position:relative;height:850px;background:linear-gradient(180deg,#1684ff,#021b6b);margin-top:20px;border-radius:30px;overflow:hidden} .art{position:absolute;top:30px;left:50%;transform:translateX(-50%);width:82%;border-radius:25px} .photo{position:absolute;right:0;bottom:150px;width:48%;height:340px;object-fit:cover;border-top-left-radius:40px;border-bottom-left-radius:40px} .bar{position:relative;background:#08297d;border:3px solid gold;border-radius:50px;padding:14px 20px;margin:18px;color:#fff;font-weight:bold} .info{position:absolute;left:10px;bottom:20px;width:70%} .selo{position:absolute;right:18px;bottom:500px;background:gold;color:#00155f;padding:10px 14px;border-radius:40px;font-weight:bold}</style></head><body><div class='box'><h1>REINO STUDIO V3</h1><input type='file' id='arte'><input type='file' id='foto'><input id='nome' placeholder='Nome do vendedor'><input id='fone' placeholder='88999999999'><select id='tema'><option>Azul Premium</option><option>Verde Premium</option></select><button onclick='preview()'>VISUALIZAR ARTE</button><button onclick='baixar()'>BAIXAR ARTE</button><div id='link'></div><div class='preview' id='preview'><img id='art' class='art'><img id='fot' class='photo'><div class='selo'>VENDEDOR AUTORIZADO</div><div class='info'><div class='bar'><span id='n'>Vendedor(a)</span></div><div class='bar'><span id='f'>(88)99999-9999</span></div></div></div></div><script src='https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js'></script><script>let a='',b='';arte.onchange=e=>{let r=new FileReader();r.onload=()=>a=r.result;r.readAsDataURL(e.target.files[0])};foto.onchange=e=>{let r=new FileReader();r.onload=()=>b=r.result;r.readAsDataURL(e.target.files[0])};function preview(){if(a)art.src=a;if(b)fot.src=b;n.innerText=nome.value||'Vendedor(a)';let x=fone.value.replace(/\D/g,'');if(x.length>=11){f.innerText='('+x.slice(0,2)+') '+x.slice(2,7)+'-'+x.slice(7,11);link.innerText='https://wa.me/55'+x}}function baixar(){html2canvas(document.querySelector('#preview')).then(c=>{let l=document.createElement('a');l.download='arte-v3.png';l.href=c.toDataURL();l.click()})}</script></body></html>
